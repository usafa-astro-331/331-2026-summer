; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
# Stores compiled objects globally to share across multiple projects
build_cache_dir = ~/.platformio/.build_cache


[env:esp32thing_plus]
framework = arduino
platform = espressif32@7
board = sparkfun_esp32s2_thing_plus_c
lib_deps = 
	greiman/SdFat@^2.3.1
	sparkfun/SparkFun MAX1704x Fuel Gauge Arduino Library@^1.0.3
	sparkfun/SparkFun 9DoF IMU Breakout - ICM 20948 - Arduino Library@^1.3.2
	meelonusk/TB9051FTGMotorCarrier@^1.0.2
	madhephaestus/ESP32Encoder@^0.12.0
	adafruit/Adafruit INA237 and INA238 Library@^1.0.3
	SerialMenu

; Remove the default standard (e.g., gnu++11)
build_unflags = -std=gnu++11
; Set to desired standard (e.g., C++17)
build_flags = -std=gnu++17
	-I src
	-I include

monitor_speed = 115200
monitor_eol = LF

;build_flags =
;	-I include ; Relative Paths: When using build_flags in platformio.ini, paths are relative to the project root.